services:
  app:
    container_name: 104-plugin-app
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # 強制指定 DATABASE_URL，因為 Docker 內部的 host 是 db
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      # 通知 Go Scheduler 的位址 (Docker 內部 hostname)
      - SCHEDULER_URL=http://scheduler:4000
    volumes:
      # 執行期可覆寫設定（編輯主機 ./config/104.config.json 免重建映像）
      - ./config:/app/config
    depends_on:
      db:
        condition: service_healthy
      scheduler:
        condition: service_started
    networks:
      - app-network

  scheduler:
    container_name: 104-plugin-scheduler
    build: 
      context: ./src/scheduler-go
      dockerfile: Dockerfile
    restart: always
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      # 強制指定 DATABASE_URL (Host=db)
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SCHEDULER_PORT=4000
      # 觸發 Node.js 的位址 (Host=app)
      - NODE_SERVER_URL=http://app:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:18-alpine
    container_name: 104-plugin-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network: